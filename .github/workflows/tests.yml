name: tests

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Ensure fixture databases
        run: python tests/fixtures/build_sports_dbs.py
      - name: Run tests
        run: pytest tests/ -v --tb=short
